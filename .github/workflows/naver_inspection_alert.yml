name: 네이버 소재 검수 알림

on:
  schedule:
    # 매 15분마다 실행 — KST 09:00~22:00 (UTC 00:00~13:00), 월~토
    - cron: '*/15 0-13 * * 1-6'
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Secrets 설정 확인
        run: |
          echo "=== Secrets 설정 여부 확인 (값은 비공개) ==="
          [ -n "$NAVER_AD_API_KEY" ]     && echo "✅ NAVER_API_KEY: 설정됨"     || echo "❌ NAVER_API_KEY: 미설정"
          [ -n "$NAVER_AD_SECRET_KEY" ]  && echo "✅ NAVER_SECRET_KEY: 설정됨"  || echo "❌ NAVER_SECRET_KEY: 미설정"
          [ -n "$NAVER_AD_CUSTOMER_ID" ] && echo "✅ NAVER_CUSTOMER_ID: 설정됨" || echo "❌ NAVER_CUSTOMER_ID: 미설정"
          [ -n "$SLACK_INSPECTION_WEBHOOK_URL" ] && echo "✅ SLACK_WEBHOOK: 설정됨" || echo "❌ SLACK_WEBHOOK: 미설정"
        env:
          NAVER_AD_API_KEY:             ${{ secrets.NAVER_API_KEY }}
          NAVER_AD_SECRET_KEY:          ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_AD_CUSTOMER_ID:         ${{ secrets.NAVER_CUSTOMER_ID }}
          SLACK_INSPECTION_WEBHOOK_URL: ${{ secrets.SLACK_INSPECTION_WEBHOOK_URL }}

      - name: 검수 알림 실행
        run: python scripts/run_naver_inspection_alert.py --only search --verbose
        env:
          NAVER_AD_API_KEY:             ${{ secrets.NAVER_API_KEY }}
          NAVER_AD_SECRET_KEY:          ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_AD_CUSTOMER_ID:         ${{ secrets.NAVER_CUSTOMER_ID }}
          SLACK_INSPECTION_WEBHOOK_URL: ${{ secrets.SLACK_INSPECTION_WEBHOOK_URL }}

      - name: 스냅샷 업데이트 저장
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/naver_ads_inspection_snapshot.json
          git diff --cached --quiet \
            || git commit -m "chore: update inspection snapshot [skip ci]"
          git pull --rebase origin main
          git push
